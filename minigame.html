<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Metzgerei Orsch – Wurstfang</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    background:#ffe5e5;
    font-family:'Poppins', sans-serif;
}

#game{
    background:white;
    border:3px solid #b30000;
    display:block;
    margin:auto;
}

#lives img{
    width:30px;
    margin:2px;
}

.table-modern{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="container mt-4">
<div class="row">

<div class="col-md-4">
<h4>Top 10</h4>
<table class="table table-modern">
<thead class="table-dark">
<tr>
<th>#</th>
<th>Name</th>
<th>Punkte</th>
</tr>
</thead>
<tbody id="leaderboard"></tbody>
</table>
</div>

<div class="col-md-8 text-center">

<h1>Metzgerei Orsch – Wurstfang</h1>

<button class="btn btn-danger mb-2" data-bs-toggle="modal" data-bs-target="#nameModal">
Spiel starten
</button>

<canvas id="game" width="900" height="500"></canvas>

<p>
Punkte: <span id="score">0</span> |
Level: <span id="level">1</span> |
Leben: <span id="lives"></span>
</p>

</div>
</div>
</div>

<!-- Name Modal -->
<div class="modal fade" id="nameModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title">Name eingeben</h5>
</div>
<div class="modal-body">
<input type="text" id="playerName" class="form-control">
<div id="nameError" class="text-danger mt-2" style="display:none;">
Name darf nicht leer sein
</div>
</div>
<div class="modal-footer">
<button class="btn btn-primary" onclick="startGame()">Start</button>
</div>
</div>
</div>
</div>

<!-- Game Over Modal -->
<div class="modal fade" id="gameOverModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content text-center">
<div class="modal-header">
<h5 class="modal-title w-100">Du bist Orsch!</h5>
</div>
<div class="modal-body">
<p>Dein Score: <span id="finalScore"></span></p>
</div>
<div class="modal-footer justify-content-center">
<button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#nameModal">
Nochmal spielen
</button>
<button class="btn btn-secondary" data-bs-dismiss="modal">
orsch lecken
</button>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAQdMkMRsSbj759EbFme9kFBzBBxPh9tb8",
  authDomain: "metzgerei-orsch-wurstfang.firebaseapp.com",
  projectId: "metzgerei-orsch-wurstfang"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {x:220,y:430,width:80,height:60};
let sausages = [];
let score = 0;
let lives = 3;
let running = false;
let playerName = "";

let level = 1;
let speed = 3;
let spawnInterval = 1000;
let lastSpawn = 0;

let startTime = 0;
let maxScorePerSecond = 5;

// Bilder
const buttImg = new Image();
const sausageImg = new Image();

buttImg.src = "hintern.png";
sausageImg.src = "wurst.png";

// WICHTIG: erst starten wenn Bilder geladen sind
let assetsLoaded = 0;

function assetLoaded(){
    assetsLoaded++;
    if(assetsLoaded === 2){
        requestAnimationFrame(update);
    }
}

buttImg.onload = assetLoaded;
sausageImg.onload = assetLoaded;

document.addEventListener("mousemove", e=>{
    if(!running) return;
    let rect = canvas.getBoundingClientRect();
    player.x = e.clientX - rect.left - player.width/2;
});

function updateLivesDisplay(){
    const livesContainer = document.getElementById("lives");
    livesContainer.innerHTML = "";

    const maxLives = 3;

    for(let i=0; i<maxLives; i++){
        let img = document.createElement("img");

        if(i < lives){
            img.src = "toni.png";
        } else {
            img.src = "toni-over.png";
        }

        livesContainer.appendChild(img);
    }
}

function spawnSausage(){
    sausages.push({
        x:Math.random()*(canvas.width - 40),
        y:-20,
        width:40,
        height:40
    });
}

function updateLevel(){
    let newLevel = Math.floor(score / 5) + 1;
    if(newLevel !== level){
        level = newLevel;
        speed = 3 + (level - 1) * 0.8;
        spawnInterval = Math.max(200, 1000 - (level - 1) * 120);
        document.getElementById("level").innerText = level;
    }
}

function startGame(){
    const input = document.getElementById("playerName").value.trim();
    if(input === ""){
        document.getElementById("nameError").style.display = "block";
        return;
    }

    document.getElementById("nameError").style.display = "none";
    playerName = input;

    bootstrap.Modal.getInstance(document.getElementById('nameModal')).hide();

    score = 0;
    lives = 3;
    level = 1;
    speed = 3;
    spawnInterval = 1000;
    sausages = [];
    running = true;
    startTime = Date.now();

    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;

    updateLivesDisplay();
}

function gameOver(){
    running = false;

    document.getElementById("finalScore").innerText = score;

    let duration = (Date.now() - startTime) / 1000;
    if(score <= duration * maxScorePerSecond){
        db.collection("scores").add({
            name: playerName,
            score: score,
            time: Date.now()
        }).then(loadLeaderboard);
    }

    new bootstrap.Modal(document.getElementById('gameOverModal')).show();
}

function loadLeaderboard(){
    const table = document.getElementById("leaderboard");
    table.innerHTML = "";

    db.collection("scores").orderBy("score","desc").limit(10).get().then(snapshot=>{
        let rank = 1;
        snapshot.forEach(doc=>{
            let d = doc.data();
            let medal = rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":rank;

            table.innerHTML += `<tr><td>${medal}</td><td>${d.name}</td><td>${d.score}</td></tr>`;
            rank++;
        });
    });
}

function update(timestamp){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(running){
        if(timestamp - lastSpawn > spawnInterval){
            spawnSausage();
            lastSpawn = timestamp;
        }

        ctx.drawImage(buttImg, player.x, player.y, player.width, player.height);

        sausages.forEach((s,i)=>{
            s.y += speed;
            ctx.drawImage(sausageImg, s.x, s.y, 40, 40);

            if(s.y + 40 > player.y &&
               s.x < player.x + player.width &&
               s.x + 40 > player.x){
                sausages.splice(i,1);
                score++;
                document.getElementById("score").innerText = score;
                updateLevel();
            }

            if(s.y > canvas.height){
                sausages.splice(i,1);
                lives--;
                updateLivesDisplay();
                if(lives <= 0) gameOver();
            }
        });
    }

    requestAnimationFrame(update);
}

updateLivesDisplay();
loadLeaderboard();
</script>

</body>
</html>
